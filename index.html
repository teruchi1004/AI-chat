<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AIチャット</title>

<style>

body{
margin:0;
font-family:Meiryo,Arial;
background:#343541;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

header{
background:#202123;
padding:14px;
text-align:center;
font-weight:bold;
}

#chat{
flex:1;
overflow:auto;
padding:15px;
}

.message{
max-width:800px;
margin:auto;
padding:12px;
margin-bottom:10px;
border-radius:6px;
line-height:1.5;
}

.user{
background:#444654;
}

.ai{
background:#343541;
border:1px solid #444;
}

#inputArea{
display:flex;
padding:10px;
background:#202123;
}

#q{
flex:1;
padding:12px;
font-size:16px;
border:none;
border-radius:4px;
}

button{
margin-left:10px;
padding:12px 20px;
background:#10a37f;
border:none;
color:white;
font-size:16px;
cursor:pointer;
border-radius:4px;
}

button:hover{
background:#0e8e6d;
}

@media(max-width:600px){
.message{
font-size:14px;
}
}

</style>
</head>

<body>

<header>AIチャット</header>

<div id="chat"></div>

<div id="inputArea">
<input id="q" placeholder="質問を入力..." />
<button onclick="ask()">送信</button>
</div>

<script>

const API_KEY="AIzaSyB__qyqswG0yhQycvc2wG76QpP0IDt4ndE";

const chat=document.getElementById("chat");
const input=document.getElementById("q");

loadHistory();

input.addEventListener("keypress",function(e){
if(e.key==="Enter"){
ask();
}
});

function addMessage(text,type){

const div=document.createElement("div");
div.className="message "+type;
div.innerText=text;

chat.appendChild(div);

saveHistory();

chat.scrollTop=chat.scrollHeight;

}

function saveHistory(){

localStorage.setItem("chatHistory",chat.innerHTML);

}

function loadHistory(){

const history=localStorage.getItem("chatHistory");

if(history){
chat.innerHTML=history;
}

}

async function ask(){

const q=input.value;

if(!q)return;

addMessage("あなた: "+q,"user");

input.value="";

addMessage("AI: 考えています...","ai");

const res=await fetch(
"https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key="+API_KEY,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[{parts:[{text:q}]}]
})
}
);

const data=await res.json();

const text=data.candidates[0].content.parts[0].text;

chat.lastChild.innerText="AI: "+text;

saveHistory();

}

</script>

</body>
</html>
