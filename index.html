<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>AI辞典</title>

<style>
body{
font-family:Meiryo;
background:#343541;
color:white;
margin:0;
padding:0;
}

header{
background:#202123;
padding:15px;
text-align:center;
}

#chat{
padding:20px;
max-width:800px;
margin:auto;
}

input{
width:80%;
padding:10px;
font-size:16px;
}

button{
padding:10px 15px;
background:#10a37f;
border:none;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<header>AI辞典</header>

<div id="chat"></div>

<div style="text-align:center;padding:20px;">
<input id="q" placeholder="用語を検索">
<button onclick="ask()">検索</button>
</div>

<script>

async function ask(){

const q=document.getElementById("q").value;

if(!q){
alert("単語を入力してください");
return;
}

document.getElementById("chat").innerHTML="検索中...";

try{

const res=await fetch("/api/ask",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({q:q})
});

const data=await res.json();

document.getElementById("chat").innerHTML=
"<h3>"+q+"</h3><p>"+data.answer+"</p>";

}catch(e){

document.getElementById("chat").innerHTML=
"エラー: APIに接続できません";

}

}

</script>

</body>
</html>
